<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureVault – Register</title>
    <meta name="description" content="Create your SecureVault account with JWT-secured authentication" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0e1a;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.10);
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --error: #f87171;
            --success: #34d399;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        .blob1 {
            width: 500px;
            height: 500px;
            background: #a78bfa;
            top: -150px;
            right: -150px;
            animation-delay: 0s;
        }

        .blob2 {
            width: 400px;
            height: 400px;
            background: #6c63ff;
            bottom: -100px;
            left: -100px;
            animation-delay: 3s;
        }

        .blob3 {
            width: 300px;
            height: 300px;
            background: #06b6d4;
            top: 40%;
            left: 40%;
            animation-delay: 5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .card {
            position: relative;
            z-index: 10;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(32px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -.5px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        select option {
            background: #1e293b;
        }

        input::placeholder {
            color: var(--muted);
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.20);
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .role-card {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .role-card:hover {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.08);
        }

        .role-card.selected {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.15);
        }

        .role-card .icon {
            font-size: 20px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-link a:hover {
            color: #fff;
        }

        #message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        #message.error {
            background: rgba(248, 113, 113, 0.12);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--error);
            display: block;
        }

        #message.success {
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--success);
            display: block;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            background: var(--border);
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 4px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--muted);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
    </style>
</head>

<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <span class="logo-text">SecureVault</span>
        </div>

        <h1>Create account</h1>
        <p class="subtitle">Join SecureVault and get started for free</p>

        <form id="registerForm" autocomplete="off">
            <div class="field">
                <label for="name">Full name</label>
                <input type="text" id="name" placeholder="John Doe" required />
            </div>

            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required
                    oninput="checkStrength(this.value)" />
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <div class="field">
                <label>Role</label>
                <div class="role-grid">
                    <div class="role-card selected" id="roleUser" onclick="selectRole('ROLE_USER')">
                        <span class="icon">👤</span>
                        <div>
                            <div style="font-weight:600">User</div>
                            <div style="color:var(--muted);font-size:12px">Standard access</div>
                        </div>
                    </div>
                    <div class="role-card" id="roleAdmin" onclick="selectRole('ROLE_ADMIN')">
                        <span class="icon">🛡️</span>
                        <div>
                            <div style="font-weight:600">Admin</div>
                            <div style="color:var(--muted);font-size:12px">Full access</div>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn" id="registerBtn">Create Account</button>
        </form>

        <div id="message"></div>

        <div class="divider">or</div>

        <div class="footer-link">
            Already have an account? <a href="/login.html">Sign in</a>
        </div>
    </div>

    <script>
        let selectedRole = 'ROLE_USER';

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleUser').classList.toggle('selected', role === 'ROLE_USER');
            document.getElementById('roleAdmin').classList.toggle('selected', role === 'ROLE_ADMIN');
        }

        function checkStrength(val) {
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { p: '0%', c: 'transparent', t: '' },
                { p: '25%', c: '#f87171', t: '🔴 Weak' },
                { p: '50%', c: '#fb923c', t: '🟠 Fair' },
                { p: '75%', c: '#facc15', t: '🟡 Good' },
                { p: '100%', c: '#34d399', t: '🟢 Strong' },
            ];
            const l = levels[score];
            fill.style.width = l.p;
            fill.style.background = l.c;
            text.textContent = l.t;
        }

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('message');
            msg.className = '';
            msg.style.display = 'none';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = 'Creating account <span class="loader"></span>';

            try {
                const res = await fetch('/auth/addNewUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, roles: selectedRole })
                });

                const text = await res.text();
                if (res.ok) {
                    msg.textContent = '✅ Account created! Redirecting to login…';
                    msg.className = 'success';
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    msg.textContent = '❌ ' + (text || 'Registration failed');
                    msg.className = 'error';
                }
            } catch (err) {
                msg.textContent = '❌ Unable to reach server. Is it running?';
                msg.className = 'error';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        });
    </script>
</body>

</html>
