<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureVault – Login</title>
  <meta name="description" content="Login to SecureVault – JWT-secured authentication system"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e1a;
      --surface:   rgba(255,255,255,0.05);
      --border:    rgba(255,255,255,0.10);
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --error:     #f87171;
      --success:   #34d399;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .blob1 { width: 500px; height: 500px; background: #6c63ff; top: -150px; left: -150px; animation-delay: 0s; }
    .blob2 { width: 400px; height: 400px; background: #a78bfa; bottom: -100px; right: -100px; animation-delay: 3s; }
    .blob3 { width: 300px; height: 300px; background: #38bdf8; top: 50%; left: 60%; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }

    h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.20);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }
    .footer-link a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .footer-link a:hover { color: #fff; }

    #message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      word-break: break-all;
    }
    #message.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); display: block; }
    #message.success { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3); color: var(--success); display: block; }

    .loader {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      color: var(--muted); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .token-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      color: var(--success);
      word-break: break-all;
      font-family: monospace;
      margin-top: 12px;
      display: none;
    }
    .token-box.show { display: block; }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <span class="logo-text">SecureVault</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in with your email and password</p>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="off"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="off"/>
      </div>

      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>

    <div id="message"></div>
    <div class="token-box" id="tokenBox"></div>
    <button class="copy-btn" id="copyBtn" style="display:none" onclick="copyToken()">📋 Copy Token</button>

    <div class="divider">or</div>

    <div class="footer-link">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
    <div class="footer-link" style="margin-top:8px">
      <a href="/dashboard.html">→ Go to Dashboard</a>
    </div>
  </div>

  <script>
    let jwtToken = '';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('message');
      const tokenBox = document.getElementById('tokenBox');
      const copyBtn = document.getElementById('copyBtn');
      msg.className = '';
      msg.style.display = 'none';
      tokenBox.classList.remove('show');
      copyBtn.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = 'Signing in <span class="loader"></span>';

      try {
        const res = await fetch('/auth/generateToken', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: email, password })
        });

        const text = await res.text();
        if (res.ok) {
          jwtToken = text;
          localStorage.setItem('jwt_token', jwtToken);
          localStorage.setItem('jwt_email', email);
          msg.textContent = '✅ Login successful! Redirecting…';
          msg.className = 'success';
          tokenBox.textContent = text;
          tokenBox.classList.add('show');
          copyBtn.style.display = 'inline-block';
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 1800);
        } else {
          msg.textContent = '❌ ' + (text || 'Invalid credentials');
          msg.className = 'error';
        }
      } catch (err) {
        msg.textContent = '❌ Unable to reach server. Is it running?';
        msg.className = 'error';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });

    function copyToken() {
      navigator.clipboard.writeText(jwtToken);
      document.getElementById('copyBtn').textContent = '✅ Copied!';
      setTimeout(() => { document.getElementById('copyBtn').textContent = '📋 Copy Token'; }, 2000);
    }
  </script>
</body>
</html>
